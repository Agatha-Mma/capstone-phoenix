- name: Ensure k3s config directory exists
  file:
    path: /etc/rancher/k3s
    state: directory
    mode: '0755'

- name: Write k3s config with public IP as TLS SAN
  copy:
    dest: /etc/rancher/k3s/config.yaml
    content: |
      tls-san:
        - "{{ ansible_host }}"

- name: Install k3s server
  shell: curl -sfL https://get.k3s.io | sh -
  args:
    creates: /usr/local/bin/k3s

- name: Restart k3s to apply TLS SAN config
  systemd:
    name: k3s
    state: restarted

- name: Wait for node token to exist
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token

- name: Read node token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: node_token_raw

- name: Save token as fact for other hosts
  set_fact:
    k3s_token: "{{ node_token_raw.content | b64decode | trim }}"

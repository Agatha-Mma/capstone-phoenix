- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Ensure UFW is installed
  apt:
    name: ufw
    state: present

- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Allow Kubernetes API
  ufw:
    rule: allow
    port: "6443"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny

- name: Allow Flannel VXLAN traffic between cluster nodes
  ufw:
    rule: allow
    port: "8472"
    proto: udp
    from_ip: 10.0.1.0/24

- name: Set UFW default forward policy to ACCEPT (required for k3s pod networking)
  lineinfile:
    path: /etc/default/ufw
    regexp: '^DEFAULT_FORWARD_POLICY='
    line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
  notify: reload ufw

- name: Ensure UFW is reloaded if forward policy changed
  meta: flush_handlers
